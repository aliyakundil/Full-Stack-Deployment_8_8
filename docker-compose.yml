version: "3.8"

services:

  frontend:
    image: fullstack-frontend:latest
    environment:
      - REACT_APP_API_URL=http://localhost/api
    networks:
      - frontend-network

  backend:
    image: fullstack-backend:latest
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=error
      - MONGODB_URI=mongodb://mongo:27017/todoapp
      - REDIS_URL=redis://redis:6379
      - ENABLE_METRICS=true
    networks:
      - backend-network
      - frontend-network

  mongo:
    image: mongo:6
    volumes:
      - mongo_data:/data/db
    networks:
      - backend-network

  redis:
    image: redis:7-alpine
    networks:
      - backend-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - frontend-network
      - backend-network

volumes:
  mongo_data:

networks:
  frontend-network:
  backend-network: