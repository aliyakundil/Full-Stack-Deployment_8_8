version: "3.9"

services:

  frontend:
    image: fullstack-frontend:latest
    environment:
      - REACT_APP_API_URL=/api
    networks:
      - frontend-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  backend:
    image: fullstack-backend:latest
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=error
      - MONGODB_URI=mongodb://mongo:27017/todoapp
      - REDIS_URL=redis://redis:6379
      - ENABLE_METRICS=true
    networks:
      - backend-network
      - frontend-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - backend-network
    deploy:
      replicas: 1

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks:
      - backend-network
    deploy:
      replicas: 1

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend-network
      - backend-network
    deploy:
      replicas: 1

volumes:
  mongo_data:

networks:
  frontend-network:
    driver: overlay
  backend-network:
    driver: overlay