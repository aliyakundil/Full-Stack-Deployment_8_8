version: "3.9"

services:

  frontend:
    build:
      context: ./frontend
    environment:
      - REACT_APP_API_URL=https://yourdomain.com/api
    restart: unless-stopped
    networks:
      - frontend-network

  backend:
    build:
      context: ./backend
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=error
    restart: unless-stopped
    networks:
      - backend-network
      - frontend-network
    depends_on:
      - mongo
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_password
    secrets:
      - mongo_password
    volumes:
    - mongo_data:/data/db
    - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - frontend-network
      - backend-network

volumes:
  mongo-data:

networks:
  frontend-network:
  backend-network:

secrets:
  mongo_password:
    file: ./secrets/mongo_password.txt